<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Manager</title>
<style>
:root {
  --bg: #0d1117;
  --bg-sidebar: #161b22;
  --bg-card: #1c2129;
  --bg-input: #0d1117;
  --bg-output: #0b0f14;
  --border: #30363d;
  --text: #c9d1d9;
  --text-heading: #f0f6fc;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --accent-blue: #1f6feb;
  --green: #238636;
  --green-hover: #2ea043;
  --red: #f85149;
  --yellow: #d29922;
  --btn-bg: #21262d;
  --btn-hover: #30363d;
}

body.light {
  --bg: #f0f2f5;
  --bg-sidebar: #f6f8fa;
  --bg-card: #ffffff;
  --bg-input: #ffffff;
  --bg-output: #fafbfc;
  --border: #d0d7de;
  --text: #24292f;
  --text-heading: #1f2328;
  --text-muted: #656d76;
  --accent: #0969da;
  --accent-blue: #0969da;
  --green: #1a7f37;
  --green-hover: #2c974b;
  --red: #cf222e;
  --yellow: #9a6700;
  --btn-bg: #f6f8fa;
  --btn-hover: #eaeef2;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; height: 100vh; overflow: hidden;
  transition: background .3s, color .3s;
}
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--bg-sidebar); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: background .3s;
}
.sidebar-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h1 {
  font-size: 16px; font-weight: 600; color: var(--text-heading);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header h1 svg { width: 20px; height: 20px; fill: var(--accent); }
.theme-toggle {
  background: var(--btn-bg); border: 1px solid var(--border); border-radius: 50%;
  color: var(--text); cursor: pointer; padding: 0; width: 32px; height: 32px;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.theme-toggle:hover { border-color: var(--accent-blue); background: color-mix(in srgb, var(--accent-blue) 12%, transparent); }
.sidebar-section-title {
  padding: 14px 16px 8px 16px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-muted);
}
.sidebar-list { flex: 1; overflow-y: auto; padding: 0 8px 8px 8px; }
.project-item {
  padding: 10px 12px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2px; transition: background .15s; font-size: 13px;
}
.project-item:hover { background: var(--btn-hover); }
.project-item.active {
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
}
.project-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.project-item .del-btn {
  opacity: 0; background: none; border: none; color: var(--red);
  cursor: pointer; font-size: 16px; padding: 0 4px; transition: opacity .15s;
  line-height: 1;
}
.project-item:hover .del-btn { opacity: 1; }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
.sidebar-footer .add-proj-btn {
  width: 100%; padding: 9px; border-radius: 6px;
  background: var(--accent-blue); border: none; color: #fff; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: background .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.sidebar-footer .add-proj-btn:hover { filter: brightness(1.1); }
.sidebar-footer .add-proj-btn svg { width: 14px; height: 14px; fill: #fff; }
.empty-hint { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 15px;
}
.main-content { display: none; flex: 1; flex-direction: column; }
.main-content.visible { display: flex; }
.toolbar {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  flex-shrink: 0;
}
.toolbar .proj-name { font-size: 15px; font-weight: 600; color: var(--text-heading); }
.toolbar .proj-path { font-size: 11px; color: var(--text-muted); }
.action-bar {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; flex-wrap: wrap;
  flex-shrink: 0;
}
.action-btn {
  padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--btn-bg); color: var(--text); cursor: pointer;
  font-size: 12px; transition: all .15s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
  flex-shrink: 0;
}
.action-btn svg { width: 14px; height: 14px; flex-shrink: 0; fill: var(--text); }
.action-btn:hover { background: var(--btn-hover); border-color: var(--text-muted); }
.action-btn:disabled { opacity: .4; cursor: not-allowed; }
.action-btn.running { border-color: var(--yellow); color: var(--yellow); }
.action-btn.running svg { fill: var(--yellow); }
.action-btn.danger { border-color: color-mix(in srgb, var(--red) 40%, transparent); color: var(--red); }
.action-btn.danger svg { fill: var(--red); }
.action-btn.danger:hover { background: color-mix(in srgb, var(--red) 10%, transparent); }
.action-btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
.action-btn.primary svg { fill: #fff; }
.action-btn.primary:hover { background: var(--green-hover); border-color: var(--green-hover); }
.output-panel {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  background: var(--bg-output); min-height: 0; padding: 0;
}
.output-panel .placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-muted); font-size: 14px;
  flex-direction: column; gap: 8px;
}
.output-panel .placeholder svg { width: 32px; height: 32px; fill: var(--text-muted); opacity: .4; }
.output-entry {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  font-family: "Cascadia Code","Fira Code","Consolas","SF Mono",monospace;
  font-size: 13px; line-height: 1.6;
}
.output-entry:hover { background: color-mix(in srgb, var(--accent) 3%, transparent); }
.output-entry .cmd-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.output-entry .cmd-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .3px;
}
.output-entry .cmd-badge.success { background: color-mix(in srgb, var(--green) 20%, transparent); color: var(--green); }
.output-entry .cmd-badge.fail { background: color-mix(in srgb, var(--red) 20%, transparent); color: var(--red); }
.output-entry .cmd-command { color: var(--accent); font-size: 12px; font-weight: 500; }
.output-entry .cmd-output {
  color: var(--text); white-space: pre-wrap; word-break: break-all;
  padding: 8px 12px; background: var(--bg); border-radius: 4px;
  border-left: 2px solid var(--border);
}
.output-entry .cmd-error {
  color: var(--red); white-space: pre-wrap; word-break: break-all;
  padding: 8px 12px; background: color-mix(in srgb, var(--red) 5%, transparent);
  border-radius: 4px; border-left: 2px solid var(--red);
}
.output-entry .cmd-empty { color: var(--text-muted); font-style: italic; padding: 8px 12px; }
.spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-sidebar); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
  max-height: 80vh; display: flex; flex-direction: column;
}
.modal h3 {
  color: var(--text-heading); font-size: 15px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.modal h3 svg { width: 18px; height: 18px; fill: var(--accent); }
.modal label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text-muted); margin-bottom: 4px;
}
.modal input[type="text"] {
  width: 100%; padding: 8px 12px; border-radius: 6px;
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; outline: none; margin-bottom: 12px;
  font-family: inherit;
}
.modal input:focus { border-color: var(--accent); }

.selected-path {
  padding: 6px 10px; background: var(--bg); border-radius: 6px;
  font-size: 12px; color: var(--accent); font-family: "Cascadia Code","Fira Code","Consolas",monospace;
  border: 1px dashed var(--border); margin-bottom: 12px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.pick-area {
  display: flex; align-items: center; margin-bottom: 12px;
}
.pick-area .pick-btn {
  padding: 8px 16px; border-radius: 6px; background: var(--btn-bg);
  border: 1px solid var(--border); color: var(--text); cursor: pointer;
  font-size: 13px; white-space: nowrap; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.pick-area .pick-btn:hover { background: var(--btn-hover); border-color: var(--accent); }
.pick-area .pick-btn svg { width: 14px; height: 14px; fill: var(--text); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.modal-actions button {
  padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border); transition: all .15s;
}
.modal-actions .btn-cancel { background: var(--btn-bg); color: var(--text); }
.modal-actions .btn-cancel:hover { background: var(--btn-hover); }
.modal-actions .btn-confirm { background: var(--accent-blue); color: #fff; border: none; }
.modal-actions .btn-confirm:hover { filter: brightness(1.1); }
.modal-actions .btn-confirm:disabled { opacity: .4; cursor: not-allowed; filter: none; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>
      <svg viewBox="0 0 16 16"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM2.04 4.326c.325 1.329 2.532 2.54 3.717 3.19.48.263.793.434.743.484-.08.08-.162.158-.242.234-.416.396-.787.749-.758 1.266.035.634.618.824 1.214 1.017.577.188 1.168.38 1.286.983.082.417-.075.988-.22 1.52-.215.782-.406 1.48.22 1.48 1.5-.5 3.798-3.186 4-5 .138-1.243-2-2-3.5-2.5-.478-.16-.755.081-.99.284-.172.15-.322.279-.51.216-.445-.148-2.5-2-1.5-2.5.78-.39.952-.171 1.227.182.078.099.16.203.273.318.609.304.662-.132.723-.633.039-.322.081-.671.277-.867.434-.434 1.265-.791 2.028-1.12.712-.306 1.365-.587 1.579-.88A7 7 0 1 0 2.04 4.327Z"/></svg>
      Git Manager
    </h1>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
  </div>
  <div class="sidebar-section-title">项目清单</div>
  <div class="sidebar-list" id="projectList">
    <div class="empty-hint">暂无项目，请点击下方按钮添加</div>
  </div>
  <div class="sidebar-footer">
    <button class="add-proj-btn" onclick="showAddModal()">
      <svg viewBox="0 0 16 16"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"/></svg>
      添加项目
    </button>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="main-empty" id="emptyHint">← 选择一个项目开始管理</div>
  <div class="main-content" id="mainContent">
    <div class="toolbar">
      <span class="proj-name" id="projName"></span>
      <span class="proj-path" id="projPath"></span>
    </div>
    <div class="action-bar">
      <button class="action-btn primary" onclick="runGit('status')">
        <svg viewBox="0 0 16 16"><path d="M1.5 8a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0ZM8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0ZM6.379 5.227a.25.25 0 0 1 .415-.15l4.5 4.5a.25.25 0 0 1-.177.427H6.25a.25.25 0 0 1-.25-.25l.001-1.371c0-.138.112-.25.25-.25h.137ZM5 5.25a.25.25 0 0 1 .25-.25h1.371a.25.25 0 0 1 .25.25v.137a.25.25 0 0 1-.25.25H5.25A.25.25 0 0 1 5 5.386V5.25Z"/></svg>
        Status
      </button>
      <button class="action-btn" onclick="runGit('fetch')">
        <svg viewBox="0 0 16 16"><path d="M7.53 1.282a.75.75 0 0 1 .94 0l4.97 4.5a.75.75 0 1 1-.94 1.168L8 2.965 1.53 6.95a.75.75 0 0 1-.94-1.168l4.97-4.5ZM2.5 10a.75.75 0 0 1 .75.75v1.5a.25.25 0 0 0 .25.25h9a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 12.5 14h-9A1.75 1.75 0 0 1 1.75 12.25v-1.5A.75.75 0 0 1 2.5 10Z"/></svg>
        Fetch
      </button>
      <button class="action-btn" onclick="runGit('pull')">
        <svg viewBox="0 0 16 16"><path d="M7.53 12.718a.75.75 0 0 0 .94 0l4.97-4.5a.75.75 0 1 0-.94-1.168L8 10.535 1.53 7.05a.75.75 0 0 0-.94 1.168l4.97 4.5ZM2.5 3.5A1.75 1.75 0 0 1 4.25 1.75h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v1.5a.75.75 0 0 1-1.5 0v-1.5Z"/></svg>
        Pull
      </button>
      <button class="action-btn danger" onclick="showCommitModal()">
        <svg viewBox="0 0 16 16"><path d="M9.53 1.282a.75.75 0 0 1 .94 0l4.97 4.5a.75.75 0 1 1-.94 1.168L10 3.215v7.845a.75.75 0 0 1-1.5 0V3.215l-4.53 3.735a.75.75 0 0 1-.94-1.168l4.97-4.5ZM2.5 13a.75.75 0 0 1 .75-.75h9.5a.75.75 0 0 1 0 1.5h-9.5A.75.75 0 0 1 2.5 13Z"/></svg>
        Push
      </button>
      <button class="action-btn" onclick="runGit('branch')">
        <svg viewBox="0 0 16 16"><path d="M11.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm-2.25.75a2.25 2.25 0 1 1 3 2.122V10a2.5 2.5 0 0 1-2.5 2.5H7.935A2.251 2.251 0 1 1 5.5 11h4.5a1 1 0 0 0 1-1V5.372a2.25 2.25 0 0 1-1.5-2.122ZM5.75 12.25a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5ZM4.25 9.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"/></svg>
        Branch
      </button>
      <button class="action-btn" onclick="runGit('log')">
        <svg viewBox="0 0 16 16"><path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75V1.75Zm8.755 3a2.25 2.25 0 0 1 2.25-2.25H14.5v9h-3.757c-.71 0-1.4.201-1.992.572l.004-7.322Zm-1.504 7.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574Z"/></svg>
        Log
      </button>
      <button class="action-btn" onclick="runGit('diff')">
        <svg viewBox="0 0 16 16"><path d="M8.75.75a.75.75 0 0 0-1.5 0v5.94L4.72 4.16A.75.75 0 1 0 3.28 5.84l4.25 4.25a.75.75 0 0 0 1.06 0l4.25-4.25A.75.75 0 1 0 11.28 4.16L8.75 6.69V.75ZM0 11.75A.75.75 0 0 1 .75 11h14.5a.75.75 0 0 1 0 1.5H.75a.75.75 0 0 1-.75-.75Z"/></svg>
        Diff
      </button>
      <button class="action-btn" onclick="runGit('stash_list')">
        <svg viewBox="0 0 16 16"><path d="M10.75 1.75a.75.75 0 0 0-1.5 0v1.06a3.752 3.752 0 0 0-3.486 2.135L3.69 9.903a.75.75 0 0 0 .12.85l4.25 4.25a.75.75 0 0 0 1.06 0l4.25-4.25a.75.75 0 0 0 .12-.85l-2.074-4.958A3.752 3.752 0 0 0 10.75 3.81V1.75ZM8.75 4.5h-1.5a2.25 2.25 0 0 1 1.5 0Zm-1.5 0a2.252 2.252 0 0 0-1.922 1.148L3.93 9.207l3.54 3.54 3.54-3.54-1.398-3.559A2.252 2.252 0 0 0 7.69 4.5H8.75a.75.75 0 0 1 0 1.5h-1.5a.75.75 0 0 1 0-1.5Z"/></svg>
        Stash
      </button>
    </div>
    <div class="output-panel" id="outputPanel">
      <div class="placeholder">
        <svg viewBox="0 0 16 16"><path d="M0 2.75A.75.75 0 0 1 .75 2h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 2.75ZM0 8a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm.75 4.5a.75.75 0 0 0 0 1.5h14.5a.75.75 0 0 0 0-1.5H.75Z"/></svg>
        点击上方按钮执行操作，输出将显示在此处
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3><svg viewBox="0 0 16 16"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"/></svg>添加项目</h3>
    <label>项目名称</label>
    <input type="text" id="addName" placeholder="输入项目名称">
    <label>仓库目录</label>
    <div class="pick-area">
      <button class="pick-btn" onclick="pickFolder()">
        <svg viewBox="0 0 16 16"><path d="M.513 1.513A1.75 1.75 0 0 1 1.75 1h3.5c.55 0 1.07.26 1.4.7l.9 1.2a.25.25 0 0 0 .2.1H13a1 1 0 0 1 1 1v.5H2.75a.75.75 0 0 0 0 1.5h11.978a1 1 0 0 1 .994 1.117L15 13.25A1.75 1.75 0 0 1 13.25 15H2.75A1.75 1.75 0 0 1 1 13.25V3.25c0-.464.184-.91.513-1.237ZM2.75 13.5a.25.25 0 0 0 .25.25h10.5a.25.25 0 0 0 .25-.25V5.5H2.75v8Z"/></svg>
        选择文件夹
      </button>
    </div>
    <div class="selected-path" id="selectedPath">尚未选择目录</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-confirm" id="confirmAddBtn" onclick="addProject()" disabled>确认添加</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="commitModal">
  <div class="modal">
    <h3><svg viewBox="0 0 16 16"><path d="M9.53 1.282a.75.75 0 0 1 .94 0l4.97 4.5a.75.75 0 1 1-.94 1.168L10 3.215v7.845a.75.75 0 0 1-1.5 0V3.215l-4.53 3.735a.75.75 0 0 1-.94-1.168l4.97-4.5ZM2.5 13a.75.75 0 0 1 .75-.75h9.5a.75.75 0 0 1 0 1.5h-9.5A.75.75 0 0 1 2.5 13Z"/></svg>提交并推送</h3>
    <label>提交说明</label>
    <input type="text" id="commitMsg" placeholder="请输入本次提交说明...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCommitModal()">取消</button>
      <button class="btn-confirm" onclick="doCommitPush()">提交并推送</button>
    </div>
  </div>
</div>

<script>

let projects = [];
let activeId = null;
var currentTheme = localStorage.getItem("gitman-theme") || "dark";

(function init() {
  if (currentTheme === "light") document.body.classList.add("light");
  updateThemeBtn();
  loadProjects();
})();

function toggleTheme() {
  currentTheme = currentTheme === "dark" ? "light" : "dark";
  localStorage.setItem("gitman-theme", currentTheme);
  if (currentTheme === "light") document.body.classList.add("light");
  else document.body.classList.remove("light");
  updateThemeBtn();
}

function updateThemeBtn() {
  var btn = document.querySelector(".theme-toggle");
  btn.textContent = currentTheme === "dark" ? "☀️" : "🌙";
  btn.title = currentTheme === "dark" ? "切换白天模式" : "切换夜晚模式";
}

async function loadProjects() {
  var res = await fetch("/api/projects");
  projects = await res.json();
  renderList();
  if (activeId && !projects.find(function(p) { return p.id === activeId; })) {
    activeId = null; showEmpty();
  }
}

function renderList() {
  var el = document.getElementById("projectList");
  if (projects.length === 0) {
    el.innerHTML = '<div class="empty-hint">暂无项目，请点击下方按钮添加</div>';
    return;
  }
  el.innerHTML = projects.map(function(p) {
    return '<div class="project-item' + (activeId === p.id ? " active" : "") + '" onclick="selectProject(' + p.id + ')">' +
      '<span class="name">' + esc(p.name) + '</span>' +
      '<button class="del-btn" onclick="event.stopPropagation();delProject(' + p.id + ')" title="删除">&times;</button>' +
      '</div>';
  }).join("");
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function showEmpty() {
  document.getElementById("emptyHint").style.display = "flex";
  document.getElementById("mainContent").classList.remove("visible");
}

function selectProject(id) {
  activeId = id;
  var p = projects.find(function(x) { return x.id === id; });
  if (!p) return;
  document.getElementById("emptyHint").style.display = "none";
  document.getElementById("mainContent").classList.add("visible");
  document.getElementById("projName").textContent = p.name;
  document.getElementById("projPath").textContent = p.dir;
  document.getElementById("outputPanel").innerHTML =
    '<div class="placeholder">' +
      '<svg viewBox="0 0 16 16"><path d="M0 2.75A.75.75 0 0 1 .75 2h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 2.75ZM0 8a.75.75 0 0 1 .75-.75h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 8Zm.75 4.5a.75.75 0 0 0 0 1.5h14.5a.75.75 0 0 0 0-1.5H.75Z"/></svg>' +
      '点击上方按钮执行操作，输出将显示在此处' +
    '</div>';
  renderList();
}

function showAddModal() {
  document.getElementById("addName").value = "";
  document.getElementById("selectedPath").textContent = "尚未选择目录";
  document.getElementById("selectedPath").style.borderColor = "var(--border)";
  document.getElementById("selectedPath").style.color = "var(--text-muted)";
  document.getElementById("confirmAddBtn").disabled = true;
  document.getElementById("addModal").classList.add("show");
  setTimeout(function() { document.getElementById("addName").focus(); }, 100);
}

async function pickFolder() {
  document.getElementById("selectedPath").textContent = "正在打开选择器...";
  document.getElementById("selectedPath").style.color = "var(--text-muted)";
  try {
    var res = await fetch("/api/pick-folder", { method: "POST" });
    var data = await res.json();
    if (data.path) {
      document.getElementById("selectedPath").textContent = data.path;
      document.getElementById("selectedPath").style.color = "var(--accent)";
      document.getElementById("selectedPath").style.borderColor = "var(--accent)";
      document.getElementById("confirmAddBtn").disabled = false;
    } else {
      document.getElementById("selectedPath").textContent = "未选择目录（已取消）";
      document.getElementById("selectedPath").style.color = "var(--text-muted)";
      document.getElementById("selectedPath").style.borderColor = "var(--border)";
      document.getElementById("confirmAddBtn").disabled = true;
    }
  } catch(e) {
    document.getElementById("selectedPath").textContent = "选择器启动失败，请手动输入路径";
    document.getElementById("selectedPath").style.color = "var(--red)";
  }
}

function closeAddModal() {
  document.getElementById("addModal").classList.remove("show");
}

function addProject() {
  var name = document.getElementById("addName").value.trim();
  var dir = document.getElementById("selectedPath").textContent;
  if (!name) return alert("请填写项目名称");
  if (!dir || dir === "尚未选择目录" || dir.indexOf("失败") >= 0) return alert("请先选择仓库目录");
  fetch("/api/projects", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name: name, dir: dir })
  }).then(function(r) { return r.json(); }).then(function(data) {
    if (data.error) return alert(data.error);
    closeAddModal();
    loadProjects().then(function() { selectProject(data.id); });
  });
}

async function delProject(id) {
  if (!confirm("确定删除该项目？")) return;
  await fetch("/api/projects/" + id, { method: "DELETE" });
  await loadProjects();
}

function showCommitModal() {
  if (!activeId) return;
  document.getElementById("commitMsg").value = "";
  document.getElementById("commitModal").classList.add("show");
  setTimeout(function() { document.getElementById("commitMsg").focus(); }, 100);
}

function closeCommitModal() {
  document.getElementById("commitModal").classList.remove("show");
}

async function doCommitPush() {
  var msg = document.getElementById("commitMsg").value.trim();
  if (!msg) return alert("请输入提交说明");
  closeCommitModal();
  await runGit("commit_push", msg);
}

function disableBtns(disable) {
  document.querySelectorAll(".action-btn").forEach(function(b) { b.disabled = disable; });
}

async function runGit(action, extraMsg) {
  if (!activeId) return;
  var panel = document.getElementById("outputPanel");
  var placeholder = panel.querySelector(".placeholder");
  if (placeholder) panel.innerHTML = "";

  var btns = document.querySelectorAll(".action-btn");
  var targetBtn = null;
  var searchLabel = action === "commit_push" ? "push" : action;
  btns.forEach(function(b) {
    if (b.textContent.trim().toLowerCase().indexOf(searchLabel) >= 0) targetBtn = b;
  });
  if (targetBtn) targetBtn.classList.add("running");
  disableBtns(true);

  var entry = document.createElement("div");
  entry.className = "output-entry";
  var label = action === "commit_push" ? "commit + push" : action;
  entry.innerHTML = '<div class="cmd-header"><span class="spinner"></span><span class="cmd-command">$ git ' + label + '</span></div>';
  panel.prepend(entry);
  entry.scrollIntoView({ behavior: "smooth" });

  try {
    var body = { action: action };
    if (extraMsg) body.message = extraMsg;
    var res = await fetch("/api/projects/" + activeId + "/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    var data = await res.json();

    var badgeClass = data.success ? "success" : "fail";
    var badgeText = data.success ? "成功" : "失败";
    var html = '<div class="cmd-header">' +
      '<span class="cmd-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '<span class="cmd-command">$ git ' + label + '</span>' +
      '</div>';

    if (data.success) {
      if (data.output) html += '<div class="cmd-output" style="color:var(--green);border-left-color:var(--green);">' + esc(data.output) + '</div>';
      if (data.error) html += '<div class="cmd-output" style="color:var(--green);border-left-color:var(--green);">' + esc(data.error) + '</div>';
    } else {
      if (data.output) html += '<div class="cmd-output">' + esc(data.output) + '</div>';
      if (data.error) html += '<div class="cmd-error">' + esc(data.error) + '</div>';
    }
    if (!data.output && !data.error) html += '<div class="cmd-empty">(无输出)</div>';
    entry.innerHTML = html;
  } catch (e) {
    entry.innerHTML =
      '<div class="cmd-header"><span class="cmd-badge fail">失败</span><span class="cmd-command">$ git ' + label + '</span></div>' +
      '<div class="cmd-error">' + esc(String(e)) + '</div>';
  }

  if (targetBtn) targetBtn.classList.remove("running");
  disableBtns(false);
}
</script>
</body>
</html>
